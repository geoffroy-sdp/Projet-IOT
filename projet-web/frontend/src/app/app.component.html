<div *ngIf="isLoggedIn" id="main-container">

  <div id='button-panel'>
    <div id="groupe_buttons">
      <div class="buttons">
        <box-buttons (buttonClicked)="onHomeClick()"></box-buttons>
      </div>
      <div class="buttons">
        <box-buttons [my-button]="button1" (buttonClicked)="onButton1Click()"></box-buttons>
      </div>
      <div class="buttons">
        <box-buttons [my-button]="button2" (buttonClicked)="onButton2Click()"></box-buttons>
      </div>
      <div class="buttons">
        <box-buttons [my-button]="button3" (buttonClicked)="onButton3Click()"></box-buttons>
      </div>
      <div class="buttons">
        <box-buttons [my-button]="button4" (buttonClicked)="onButton4Click()"></box-buttons>
      </div>
    </div>
  </div>

  <div id='app-panel'>
    <div class="apps">
      <app-app-home *ngIf="currentPage === 'home'" (navigationClick)="onHomeNavigation($event)"></app-app-home>
      <app-app-map *ngIf="currentPage === 'map'"></app-app-map>
      <app-app-music *ngIf="currentPage === 'music'"></app-app-music>
      <app-app-bluetooth *ngIf="currentPage === 'bluetooth'"></app-app-bluetooth>
      <app-setting *ngIf="currentPage === 'settings'"></app-setting>
    </div>
  </div>

</div>

<!-- Auth pages: Login, Signup, Forgot Password -->
<div class="login-wrapper" *ngIf="!isLoggedIn">
  <app-login
    *ngIf="authPage === 'login'"
    (loginSuccess)="handleLogin()"
    (signupClick)="goToSignup()"
    (forgotPasswordClick)="goToForgotPassword()">
  </app-login>

  <app-signup
    *ngIf="authPage === 'signup'"
    (signupSuccess)="handleSignupSuccess()"
    (backToLogin)="goToLogin()">
  </app-signup>

  <app-forgot-password
    *ngIf="authPage === 'forgot-password'"
    (resetSuccess)="handleResetSuccess()"
    (backToLogin)="goToLogin()">
  </app-forgot-password>
</div>
