<div class="forgot-container">
  <div class="forgot-box">
    <div class="forgot-header">
      <h1>Réinitialiser votre mot de passe</h1>
      <p>Pas de panique, nous allons vous aider</p>
    </div>

    <!-- Step 1: Email -->
    <form *ngIf="step === 'email'" (ngSubmit)="requestReset()" class="forgot-form">
      <div class="step-indicator">
        <div class="step active">1</div>
        <div class="step-line"></div>
        <div class="step">2</div>
        <div class="step-line"></div>
        <div class="step">3</div>
      </div>

      <div class="form-group">
        <label for="resetEmail">Adresse email</label>
        <input
          type="email"
          id="resetEmail"
          [(ngModel)]="email"
          name="email"
          placeholder="jean.dupont@example.com"
          [disabled]="isLoading"
          required
        />
      </div>

      <p class="help-text">Nous vous enverrons un code de réinitialisation par email</p>

      <div *ngIf="error" class="error-message">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
        </svg>
        <span>{{ error }}</span>
      </div>

      <button type="submit" class="reset-button" [class.loading]="isLoading" [disabled]="isLoading">
        <span *ngIf="!isLoading">Envoyer le code</span>
        <span *ngIf="isLoading" class="loader"></span>
      </button>
    </form>

    <!-- Step 2: Code Verification -->
    <form *ngIf="step === 'code'" (ngSubmit)="verifyCode()" class="forgot-form">
      <div class="step-indicator">
        <div class="step">1</div>
        <div class="step-line"></div>
        <div class="step active">2</div>
        <div class="step-line"></div>
        <div class="step">3</div>
      </div>

      <div *ngIf="successMessage" class="success-message">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
        </svg>
        <span>{{ successMessage }}</span>
      </div>

      <div class="form-group">
        <label for="code">Code de réinitialisation</label>
        <input
          type="text"
          id="code"
          [(ngModel)]="resetCode"
          name="code"
          placeholder="Entrez le code reçu par email"
          [disabled]="isLoading"
          maxlength="6"
          required
        />
      </div>

      <div *ngIf="error" class="error-message">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
        </svg>
        <span>{{ error }}</span>
      </div>

      <button type="submit" class="reset-button" [class.loading]="isLoading" [disabled]="isLoading">
        <span *ngIf="!isLoading">Vérifier le code</span>
        <span *ngIf="isLoading" class="loader"></span>
      </button>
    </form>

    <!-- Step 3: New Password -->
    <form *ngIf="step === 'password'" (ngSubmit)="resetPassword()" class="forgot-form">
      <div class="step-indicator">
        <div class="step">1</div>
        <div class="step-line"></div>
        <div class="step">2</div>
        <div class="step-line"></div>
        <div class="step active">3</div>
      </div>

      <div class="form-group">
        <label for="newPassword">Nouveau mot de passe</label>
        <input
          type="password"
          id="newPassword"
          [(ngModel)]="newPassword"
          name="newPassword"
          placeholder="Minimum 8 caractères"
          [disabled]="isLoading"
          required
        />
      </div>

      <div class="form-group">
        <label for="confirmNewPassword">Confirmer le mot de passe</label>
        <input
          type="password"
          id="confirmNewPassword"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="Confirmer votre mot de passe"
          [disabled]="isLoading"
          required
        />
      </div>

      <div *ngIf="passwordError" class="error-message">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
        </svg>
        <span>{{ passwordError }}</span>
      </div>

      <div *ngIf="successMessage" class="success-message">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
        </svg>
        <span>{{ successMessage }}</span>
      </div>

      <button type="submit" class="reset-button" [class.loading]="isLoading" [disabled]="isLoading">
        <span *ngIf="!isLoading">Réinitialiser le mot de passe</span>
        <span *ngIf="isLoading" class="loader"></span>
      </button>
    </form>

    <div class="forgot-footer">
      <button type="button" class="link-button" (click)="onBackClick()" [disabled]="isLoading">
        ← Retour à la connexion
      </button>
    </div>
  </div>
</div>
