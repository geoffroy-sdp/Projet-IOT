<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Page Principale Electron</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      color: #333;
    }

    /* iframe de la barre supérieure */
    #barre-top {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: 75px;
      border: none;
      z-index: 1000;
    }

    main {
      margin-top: 75px;
      padding: 40px;
    }

    h1 {
      color: #0078d7;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #0078d7;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #005a9e;
    }
  </style>
</head>
<body>
  <!-- Barre supérieure via iframe -->
  <iframe id="barre-top" src="barreHaut.html"></iframe>

  <main>
    <h1>Bienvenue dans votre application Electron !</h1>
    <p>Ceci est la page principale.</p>
    <button id="clickMe">Cliquez-moi</button>
  </main>

  <script>
    const button = document.getElementById('clickMe');
    button.addEventListener('click', () => {
      alert('Bouton cliqué !');
    });
  </script>
</body>
</html>
