# Configuration PulseAudio pour utiliser hw:1,0 (Jack 3.5mm)
# Ajouter à /etc/pulse/daemon.conf ou ~/.config/pulse/daemon.conf

# Configuration d'ALSA
default-sample-rate = 48000
default-fragments = 2
default-fragment-size-msec = 25

# Force le périphérique ALSA hw:1,0 comme sortie par défaut
# Cette section doit être ajoutée dans /etc/pulse/default.pa ou ~/.config/pulse/default.pa

# Charger le module ALSA spécifique pour hw:1,0
# load-module module-alsa-sink device=hw:1,0 channels=2
# set-sink-default 1

# Alternative : utiliser pavucontrol ou pactl pour configurer
# pactl set-default-sink alsa_output.hw_1_0_playback
