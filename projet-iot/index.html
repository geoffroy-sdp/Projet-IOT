<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarPlay Interface</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="node_modules/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Écran Principal -->
    <div class="main-display">
        <!-- Header avec Settings -->
        <header class="header">
            <div class="header-content">
                <button class="back-btn header-back-btn hidden" id="headerBackBtn" title="Retour">
                    <i class="fas fa-arrow-left"></i> Retour
                </button>
                <h1>CarPlay</h1>
                <button class="settings-btn" id="settingsBtn" title="Paramètres">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </header>

        <!-- Contenu Principal -->
        <main class="main-content">
            <!-- Menu Principal -->
            <div class="menu-grid">
                <!-- Bouton GPS -->
                <button class="menu-btn gps-btn" id="gpsBtn" title="GPS">
                    <div class="menu-icon">
                        <i class="fas fa-map-location-dot"></i>
                    </div>
                    <span class="menu-label">GPS</span>
                </button>

                <!-- Bouton Bluetooth -->
                <button class="menu-btn bluetooth-btn" id="bluetoothBtn" title="Bluetooth">
                    <div class="menu-icon">
                        <i class="fa-brands fa-bluetooth"></i>
                    </div>
                    <span class="menu-label">Bluetooth</span>
                </button>

                <!-- Bouton Musique -->
                <button class="menu-btn music-btn" id="musicBtn" title="Musique">
                    <div class="menu-icon">
                        <i class="fas fa-music"></i>
                    </div>
                    <span class="menu-label">Musique</span>
                </button>
            </div>

            <!-- Interface GPS -->
            <div id="gpsContainer" class="gps-container hidden">
                <div class="gps-status-bar" id="gpsStatusBar">GPS: actif</div>
                <div id="gpsMap" class="gps-map"></div>
            </div>

            <!-- Interface Musique: remplacée par une webview Navidrome -->
            <div id="musicWebviewContainer" class="music-webview-container hidden">
                <!-- Navidrome webview full area. Use the top header back button to go back. -->
                <webview id="navidromeWebview" src="about:blank" style="width:100%;height:100%;" partition="persist:navidrome" allowpopups></webview>
            </div>

            <!-- Interface Bluetooth -->
            <div id="bluetoothInterface" class="bluetooth-interface hidden">
                <div class="bluetooth-header">
                    <h2>Bluetooth</h2>
                    <div class="scan-status" id="discoveryStatus">Recherche d'appareils...</div>
                </div>

                <!-- Liste des appareils -->
                <div class="devices-list" id="devicesList">
                    <div class="loading">En attente...</div>
                </div>
            </div>
        </main>

        <!-- Modale Paramètres -->
        <div id="settingsModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Paramètres</h2>
                    <button class="modal-close-btn" id="closeSettingsBtn" title="Fermer">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="settingsForm">
                        <!-- Navidrome User -->
                        <div class="setting-group">
                            <label for="navidromeUserInput">Utilisateur Navidrome:</label>
                            <input type="text" id="navidromeUserInput" name="NAVIDROME_USER" class="setting-input">
                        </div>

                        <!-- Navidrome Password -->
                        <div class="setting-group">
                            <label for="navidromePassInput">Mot de passe Navidrome:</label>
                            <input type="password" id="navidromePassInput" name="NAVIDROME_PASS" class="setting-input">
                        </div>

                        <!-- Backend User -->
                        <div class="setting-group">
                            <label for="backendUserInput">Email Backend:</label>
                            <input type="email" id="backendUserInput" name="BACKEND_USER" class="setting-input">
                        </div>

                        <!-- Backend Password -->
                        <div class="setting-group">
                            <label for="backendPassInput">Mot de passe Backend:</label>
                            <input type="password" id="backendPassInput" name="BACKEND_PASS" class="setting-input">
                        </div>

                        <!-- GPS Serial Path -->
                        <div class="setting-group">
                            <label for="gpsPathInput">Chemin du port GPS:</label>
                            <input type="text" id="gpsPathInput" name="GPS_SERIAL_PATH" class="setting-input" placeholder="/dev/ttyACM0">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button id="cancelSettingsBtn" class="btn-secondary">Annuler</button>
                    <button id="saveSettingsBtn" class="btn-primary">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

    <script src="node_modules/leaflet/dist/leaflet.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
